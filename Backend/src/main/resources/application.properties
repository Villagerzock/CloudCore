spring.application.name=Backend

spring.datasource.url=jdbc:mariadb://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
server.error.include-message=always

cloudcore.link-code-secret=${LINK_CODE_SECRET}
cloudcore.handshake-port=${CORE_HANDSHAKE_PORT:8081}
cloudcore.loopback-host=${CORE_HANDSHAKE_LOOPBACK_HOST:127.0.0.1}
cloudcore.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://*:*,https://*:*}
cloudcore.sftp-port=${SFTP_PORT:2222}

logging.level.org.apache.sshd.sftp=TRACE
logging.level.org.apache.sshd.server=TRACE
logging.level.org.apache.sshd.common=TRACE